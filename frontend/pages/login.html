<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Login Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/login.css') }}" />
    <style>
      .error-message {
        color: red;
        font-size: 0.9rem;
        margin-bottom: 10px;
      }

      #login-error {
        text-align: center;
        font-weight: bold;
      }

      /* ✅ Success message & logout button styles */
      #login-success {
        color: green;
        font-size: 1rem;
        text-align: center;
        font-weight: bold;
        display: none;
      }

      #logout-btn {
        display: none;
        margin-top: 10px;
        padding: 10px;
        background-color: red;
        color: white;
        border: none;
        cursor: pointer;
        width: 100%;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h1>Login</h1>
      <div id="login-error" class="error-message"></div>
      <div id="login-success">Login successful! Welcome, <span id="user-name"></span></div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required />
          <small class="error-message" id="email-error"></small>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
          <small class="error-message" id="password-error"></small>
        </div>
        <button type="submit" class="btn">Login</button>
      </form>
      <button id="logout-btn">Logout</button> <!-- ✅ Logout Button -->

      <div class="forgot-password">
        <a href="#">Forgot Password?</a>
      </div>
      <div class="not-a-member">
        <a href="/register_page">Sign Up</a>
      </div>
    </div>

    <script>
      document.getElementById("login-form").addEventListener("submit", async function (event) {
          event.preventDefault(); // Prevent form submission
    
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value.trim();
          const emailError = document.getElementById("email-error");
          const passwordError = document.getElementById("password-error");
          const loginError = document.getElementById("login-error");
          const loginSuccess = document.getElementById("login-success");
          const logoutButton = document.getElementById("logout-btn");
          const userNameSpan = document.getElementById("user-name");
    
          emailError.textContent = "";
          passwordError.textContent = "";
          loginError.textContent = "";
          loginSuccess.style.display = "none";
          logoutButton.style.display = "none";
    
          let valid = true;
    
          // Email validation
          const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailPattern.test(email)) {
            emailError.textContent = "Please enter a valid email address.";
            valid = false;
          }
    
          // Password validation
          if (password.length < 6) {
            passwordError.textContent = "Password must be at least 6 characters.";
            valid = false;
          }
    
          if (!valid) return;
    
          // Proceed with login request
          const response = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });
    
          const result = await response.json();
          console.log("[DEBUG] Login API Response:", result); // ✅ Debugging output
    
          if (response.ok) {
            userNameSpan.textContent = result.username;
            loginSuccess.style.display = "block";
            logoutButton.style.display = "block";
    
            // ✅ Redirect to the correct page based on role
            setTimeout(() => {
              window.location.href = result.redirect;  // Use redirect URL from backend
            }, 2000);
          } else {
            loginError.textContent = result.error;
          }
      });
    </script>
    
  </body>
</html>
